name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3"
  RUST_TOOLCHAIN: "1.75"

jobs:
  typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun turbo typecheck

      - name: Run tests (ccode)
        run: |
          cd packages/ccode
          bun test --coverage
        env:
          CI: true

      - name: Run tests (util)
        run: |
          cd packages/util
          bun test --coverage 2>/dev/null || echo "No tests found in packages/util"
        env:
          CI: true

  rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: services

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: services

      - name: Run tests
        run: cargo test --all
        working-directory: services

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Check formatting (Prettier)
        run: bunx prettier --check "packages/**/*.{ts,tsx,js,jsx}"

  # Quality gate - ensures all checks pass
  quality-gate:
    name: Quality Gate
    needs: [typescript, rust, lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typescript.result }}" != "success" ]] || \
             [[ "${{ needs.rust.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed!"
